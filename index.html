<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake the Ink ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            background-color: #FFF0F2; /* Soft pastel pink */
            font-family: 'Quicksand', sans-serif;
            color: #6B4E51; /* Soft earthy rose-brown for readability */
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* Container that blurs when a note is active */
        .main-content {
            transition: filter 0.5s ease;
        }

        .blur-bg {
            filter: blur(8px);
            pointer-events: none;
        }

        /* Section 1: The Intro Messages */
        .intro-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .msg-1 {
            font-size: 1.4rem;
            font-style: italic;
            opacity: 0.8;
            margin-bottom: 80px;
            animation: fadeIn 2s ease;
        }

        .msg-2 {
            font-size: 1.6rem;
            font-weight: 500;
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .msg-3 {
            font-size: 1.2rem;
            max-width: 500px;
            line-height: 1.5;
            opacity: 0.9;
            margin-bottom: 50px;
        }

        .scroll-hint {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            animation: bounce 2s infinite;
        }

        /* Section 2: The Jar Interactive Area */
        .jar-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* The Aesthetic Jar Component */
        .jar-container {
            position: relative;
            width: 180px;
            height: 240px;
            margin-bottom: 40px;
        }

        /* The Lid */
        .jar-lid {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 25px;
            background-color: #D4A373; /* Wooden/cork texture color */
            border-radius: 6px 6px 4px 4px;
            box-shadow: inset 0 -3px 5px rgba(0,0,0,0.1);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3;
        }

        /* When jar opens, lid flies up and rotates slightly */
        .jar-container.open .jar-lid {
            transform: translate(-50%, -60px) rotate(-15deg);
        }

        /* The Jar Body */
        .jar-body {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 220px;
            background: rgba(255, 255, 255, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.7);
            border-radius: 30px 30px 50px 50px;
            box-shadow: 0 10px 30px rgba(224, 172, 175, 0.3), inset 0 0 20px rgba(255,255,255,0.6);
            backdrop-filter: blur(2px);
            z-index: 2;
        }

        /* The Coin-sized Slot */
        .jar-body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 8px;
            background-color: rgba(107, 78, 81, 0.2);
            border-radius: 10px;
        }

        /* Little decorative twine bow on the jar */
        .jar-twine {
            position: absolute;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 104%;
            height: 6px;
            background: #C39B9B;
            border-radius: 3px;
            z-index: 2;
        }

        /* Decorative label on the jar */
        .jar-label {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 60px;
            background: #FFFDF9;
            border: 1px dashed #C39B9B;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Dancing Script', cursive;
            font-size: 1.2rem;
            color: #8A5E63;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* The Trigger Button */
        .btn-wake {
            background-color: #FFB3BC;
            color: white;
            border: none;
            padding: 16px 36px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 179, 188, 0.4);
            transition: all 0.3s ease;
            z-index: 2;
        }

        .btn-wake:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 179, 188, 0.6);
            background-color: #FFA1AC;
        }

        .btn-wake:active {
            transform: translateY(1px);
        }

        /* --- THE POP-UP NOTE CHIT --- */
        .overlay-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .overlay-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        .note-chit {
            background: #FFFDF9; /* Paper color */
            width: 85%;
            max-width: 400px;
            min-height: 200px;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(107, 78, 81, 0.15);
            position: relative;
            transform: scale(0.3) translateY(150px) rotate(-10deg);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            border-left: 5px solid #FFB3BC; /* Cute pastel edge */
        }

        .overlay-container.active .note-chit {
            transform: scale(1) translateY(0) rotate(0deg);
        }

        .note-date {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            margin-bottom: 15px;
            display: block;
        }

        .note-content {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.15rem;
            line-height: 1.6;
            color: #4A3537;
        }

        .close-btn {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8);
            border: none;
            color: #6B4E51;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 0.8; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <!-- Main Scrollable Content -->
    <div class="main-content" id="mainContent">
        
        <!-- Section 1: Intro Text -->
        <section class="intro-section">
            <p class="msg-1">this might not seem like much but I really hope you like it</p>
            <p class="msg-2">all the days that I missed you I have written a note for you</p>
            <p class="msg-3">everytime you miss me, dosent matter if I am with you or not</p>
            <div class="scroll-hint">Scroll Down ↓</div>
        </section>

        <!-- Section 2: Interactive Jar -->
        <section class="jar-section">
            <div class="jar-container" id="jarContainer">
                <div class="jar-lid"></div>
                <div class="jar-twine"></div>
                <div class="jar-body">
                    <div class="jar-label">Ink Notes</div>
                </div>
            </div>

            <button class="btn-wake" onclick="wakeTheInk()">Wake the Ink</button>
        </section>

    </div>

    <!-- The Pop-up Overlay for the Paper Chit -->
    <div class="overlay-container" id="overlayContainer">
        <div class="note-chit">
            <span class="note-date" id="noteDate">MAY 22, 11:11 PM</span>
            <p class="note-content" id="noteText">This is a placeholder note. Put your real feelings here!</p>
            <button class="close-btn" onclick="closeChit()">Put back in jar</button>
        </div>
    </div>

    <script>
        // --- YOUR DATA BANK ---
        // Just keep adding your daily notes right here inside the brackets!
        // Format: { date: "WHEN", text: "YOUR DEAR DIARY NOTE" }
        const missedNotes = [
            { 
                date: "Monday, 4:30 PM", 
                text: "Saw the clouds looking incredibly soft today and immediately wished we were sitting together talking about absolutely nothing." 
            },
            { 
                date: "Wednesday, 11:11 PM", 
                text: "Making a wish at 11:11 is just an excuse for me to think about your smile without feeling completely guilty about how much I miss you." 
            },
            { 
                date: "Friday, 9:00 AM", 
                text: "Even on the busiest mornings, my mind always finds a sneaky little detour back to you. Hope your day is beautiful." 
            },
            // 💡 Simply paste more lines here as you go!
        ];

        const jarContainer = document.getElementById('jarContainer');
        const mainContent = document.getElementById('mainContent');
        const overlayContainer = document.getElementById('overlayContainer');
        const noteDate = document.getElementById('noteDate');
        const noteText = document.getElementById('noteText');

        function wakeTheInk() {
            // 1. Pick a random note from your list
            const randomIndex = Math.floor(Math.random() * missedNotes.length);
            const selectedNote = missedNotes[randomIndex];

            // 2. Inject text into the chit
            noteDate.innerText = selectedNote.date.toUpperCase();
            noteText.innerText = selectedNote.text;

            // 3. Trigger the "Jar Opening" animation
            jarContainer.classList.add('open');

            // 4. Wait a brief moment for the lid to pop, then blur BG and fly the chit out
            setTimeout(() => {
                mainContent.classList.add('blur-bg');
                overlayContainer.classList.add('active');
            }, 400); 
        }

        function closeChit() {
            // Reverse everything cleanly
            overlayContainer.classList.remove('active');
            mainContent.classList.remove('blur-bg');
            
            // Wait for chit to fade before closing the jar lid
            setTimeout(() => {
                jarContainer.classList.remove('open');
            }, 300);
        }
    </script>
</body>
</html>
